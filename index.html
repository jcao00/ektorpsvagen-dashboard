<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRF Ektorsvägen · Lobby</title>
    <style>
        /* ============================================================
           🎨 CHANGE THESE 5 COLORS TO MATCH YOUR LOGO!
           ============================================================ */
        :root {
            --bg-primary: #0A1628;
            --bg-secondary: #111F33;
            --text-main: #F0F4F8;
            --text-muted: #9AAFC5;
            --gold: #D4AF37;
            --gold-light: #F4E2A3;
            --gold-dark: #A8872C;
            --gold-glow: rgba(212, 175, 55, 0.2);
            --border-subtle: rgba(212, 175, 55, 0.15);
        }

        /* --- RESET & GLOBAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: default;
        }

        /* --- MAIN BOARD --- */
        .board {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: var(--bg-primary);
            padding: 1.8vh 2vw 1.8vh 2.2vw;
            gap: 2vw;
        }

        /* --- LEFT PANEL --- */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100%;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 1vw;
            flex-shrink: 0;
            padding-bottom: 1.2vh;
            margin-bottom: 1.5vh;
            border-bottom: 2px solid var(--border-subtle);
            flex-wrap: wrap;
        }

        .logo {
            flex: 0 0 auto;
            min-width: 0;
            display: flex;
            align-items: center;
        }
        .logo img {
            width: clamp(180px, 22vw, 270px);
            height: auto;
            display: block;
        }

        .title {
            font-size: clamp(1.2rem, 2.4vh, 3rem);
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text-muted);
            line-height: 1.2;
            flex: 1;
            min-width: 150px;
        }
        .title strong {
            font-weight: 700;
            color: var(--text-main);
            display: block;
            font-size: clamp(1.5rem, 3vh, 3.8rem);
            letter-spacing: 0.04em;
            margin-top: -0.1vh;
        }
        .title strong span {
            color: var(--gold);
        }

        /* --- WEATHER IN HEADER --- */
        .weather-header {
            display: flex;
            flex-direction: column;
            gap: 0.3vh;
            background: var(--bg-secondary);
            padding: 0.6vh 1.2vw 0.8vh 1.2vw;
            border-radius: 40px;
            border: 1px solid var(--border-subtle);
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            min-width: 200px;
        }

        .weather-current {
            display: flex;
            align-items: center;
            gap: 0.6vw;
            justify-content: center;
        }
        .weather-current .icon {
            font-size: clamp(1.4rem, 2.6vh, 3rem);
            line-height: 1;
        }
        .weather-current .temp {
            font-size: clamp(1.2rem, 2.4vh, 2.8rem);
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }
        .weather-current .temp sup {
            font-size: 0.6em;
            color: var(--text-muted);
            font-weight: 400;
        }
        .weather-current .desc {
            font-size: clamp(0.6rem, 1.1vh, 1.2rem);
            color: var(--text-muted);
            font-weight: 400;
            white-space: nowrap;
        }

        .weather-forecast-header {
            display: flex;
            justify-content: space-around;
            gap: 0.4vw;
            border-top: 1px solid var(--border-subtle);
            padding-top: 0.4vh;
            margin-top: 0.2vh;
        }
        .forecast-day-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .forecast-day-header .day-label {
            font-size: clamp(0.45rem, 0.8vh, 0.9rem);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .forecast-day-header .day-icon {
            font-size: clamp(0.9rem, 1.6vh, 1.8rem);
            line-height: 1.2;
        }
        .forecast-day-header .day-temp {
            font-size: clamp(0.5rem, 0.9vh, 1rem);
            font-weight: 500;
            color: var(--text-main);
        }
        .forecast-day-header .day-temp span {
            color: var(--text-muted);
            font-weight: 400;
            margin: 0 0.1vw;
        }

        /* --- DIRECTORY GRID --- */
        .grid-wrapper {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: stretch;
        }

        .directory-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(12, 1fr);
            gap: 0.4vh 0.8vw;
            width: 100%;
            height: 100%;
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0.2vh 0.6vw;
            background: var(--bg-card);
            border-radius: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
            overflow: hidden;
        }
        .grid-item:hover {
            background: var(--gold-glow);
            border-bottom-color: var(--gold);
        }

        .person-name {
            font-size: clamp(0.7rem, 1.5vh, 1.8rem);
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .person-room {
            font-size: clamp(0.55rem, 1.1vh, 1.3rem);
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* --- RIGHT SIDEBAR --- */
        .sidebar {
            width: 26vw;
            min-width: 220px;
            max-width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            height: 100%;
        }

        .area {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 2.2vh 1.4vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(212, 175, 55, 0.05), 0 8px 32px rgba(0,0,0,0.3);
        }

        .area-title {
            font-size: clamp(0.6rem, 1.2vh, 1.2rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--gold);
            margin-bottom: 0.8vh;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 0.6vh;
            flex-shrink: 0;
        }

        .area-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 0.6vh;
            overflow: hidden;
        }

        /* --- BUS BOARD --- */
        .bus-board {
            display: flex;
            flex-direction: column;
            gap: 0.6vh;
            width: 100%;
        }

        .bus-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.2vh 0.4vw;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.15s;
        }
        .bus-row:hover {
            background: var(--gold-glow);
        }

        .bus-time {
            font-size: clamp(1.2rem, 2.6vh, 3rem);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--text-main);
            min-width: 3.2vw;
        }
        .bus-line {
            font-size: clamp(0.7rem, 1.4vh, 1.5rem);
            font-weight: 700;
            color: var(--bg-primary);
            background: var(--gold);
            padding: 0.1vh 0.8vw;
            border-radius: 20px;
            min-width: 2.2vw;
            text-align: center;
        }
        .bus-dest {
            font-size: clamp(0.7rem, 1.3vh, 1.4rem);
            color: var(--text-main);
            flex: 1;
            padding-left: 0.6vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bus-delay {
            font-size: clamp(0.6rem, 1.1vh, 1.2rem);
            color: #F97316;
            font-weight: 500;
            background: rgba(249, 115, 22, 0.15);
            padding: 0.1vh 0.5vw;
            border-radius: 12px;
            min-width: 2vw;
            text-align: center;
        }
        .bus-delay.on-time {
            color: var(--gold-light);
            background: var(--gold-glow);
        }
        .bus-error {
            color: #F87171;
            text-align: center;
            padding: 1vh 0;
            font-size: clamp(0.8rem, 1.4vh, 1.5rem);
        }
        .bus-error small {
            color: var(--text-muted);
            font-size: 0.7em;
        }

        .bus-updated {
            font-size: clamp(0.5rem, 0.9vh, 0.9rem);
            color: var(--text-muted);
            text-align: right;
            margin-top: 0.2vh;
            flex-shrink: 0;
            opacity: 0.6;
        }

        /* --- ANNOUNCEMENTS (NEWS) --- */
        .announcement-item {
            padding: 0.6vh 0.4vw;
            border-left: 3px solid var(--gold);
            padding-left: 0.8vw;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 0 6px 6px 0;
            transition: background 0.15s;
        }
        .announcement-item:hover {
            background: var(--gold-glow);
        }
        .announcement-item .title {
            font-size: clamp(0.65rem, 1.2vh, 1.3rem);
            font-weight: 500;
            color: var(--text-main);
            display: block;
            line-height: 1.3;
            /* Allow wrapping */
            white-space: normal;
            word-break: break-word;
        }
        .announcement-item .date {
            font-size: clamp(0.5rem, 0.9vh, 0.9rem);
            color: var(--gold);
            font-weight: 500;
            margin-right: 0.6vw;
            display: inline-block;
        }
        .announcement-empty {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            opacity: 0.6;
            font-size: clamp(0.8rem, 1.4vh, 1.5rem);
        }

        /* --- CLOCK + COUNT --- */
        .clock-count {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.6vh;
            flex-shrink: 0;
        }
        .live-clock {
            font-size: clamp(1.1rem, 2.2vh, 2.4rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--gold);
            font-variant-numeric: tabular-nums;
        }
        .resident-count {
            font-size: clamp(0.8rem, 1.6vh, 1.8rem);
            color: var(--gold);
            font-weight: 500;
        }
        .resident-count small {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.7em;
        }

        /* --- FULLSCREEN BUTTON --- */
        .fullscreen-btn {
            position: fixed;
            bottom: 2vh;
            right: 2vw;
            background: rgba(212, 175, 55, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            color: var(--gold-light);
            padding: 0.8vh 1.6vw;
            border-radius: 40px;
            font-size: clamp(0.7rem, 1.2vh, 1.2rem);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
            letter-spacing: 0.03em;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .fullscreen-btn:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--bg-primary);
            transform: scale(1.04);
        }

        body.idle {
            cursor: none !important;
        }

        /* --- RESPONSIVE --- */
        @media (max-aspect-ratio: 4/3) {
            .sidebar { width: 30vw; }
            .person-name { font-size: clamp(0.5rem, 1.2vh, 1.2rem); }
            .person-room { font-size: clamp(0.4rem, 0.9vh, 0.9rem); }
            .bus-time { font-size: clamp(1rem, 2.2vh, 2.2rem); }
            .weather-current .desc { display: none; }
            .weather-header { min-width: 140px; padding: 0.4vh 1vw; }
            .announcement-item .title { font-size: clamp(0.55rem, 1vh, 1rem); }
        }

        @media (max-width: 800px), (max-height: 600px) {
            .board { flex-direction: column; padding: 1.5vh 2vw; }
            .sidebar {
                flex-direction: row;
                width: 100%;
                max-width: none;
                min-width: unset;
                height: 30vh;
                gap: 1.5vw;
            }
            .directory-grid {
                grid-template-columns: repeat(6, 1fr);
                grid-template-rows: repeat(22, 1fr);
            }
            .bus-time { font-size: clamp(1.2rem, 2.8vh, 2.8rem); }
            .weather-current .desc { display: inline; }
            .weather-header { min-width: 160px; }
            .announcement-item .title { font-size: clamp(0.6rem, 1.1vh, 1.1rem); }
        }

        @media (max-width: 500px) {
            .directory-grid {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(33, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="board" id="board">

        <!-- LEFT PANEL -->
        <div class="main-panel">
            <div class="panel-header">
                <div class="logo">
                    <img src="brfektorpsvagen_270w.png" alt="Bostadsrättsförening Ektorpsvägen">
                </div>
                <div class="title">
                    BOSTADSRÄTTSFÖRENING
                    <strong>EKTORPS<span>VÄGEN</span></strong>
                </div>

                <!-- WEATHER HEADER -->
                <div class="weather-header" id="weatherHeader">
                    <div class="weather-current">
                        <span class="icon" id="weatherIcon">⛅</span>
                        <span class="temp" id="weatherTemp">--°<sup>C</sup></span>
                        <span class="desc" id="weatherDesc">Laddar...</span>
                    </div>
                    <div class="weather-forecast-header" id="weatherForecast"></div>
                </div>
            </div>

            <div class="grid-wrapper">
                <div class="directory-grid" id="directoryGrid"></div>
            </div>
        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="sidebar">
            <!-- AREA A: BUS -->
            <div class="area">
                <div class="area-title">🚌 EKTORPS CENTRUM → SLUSSEN</div>
                <div class="area-content">
                    <div class="clock-count">
                        <span class="live-clock" id="clockDisplay">--:--:--</span>
                        <span class="resident-count"><span id="residentCount">132</span> <small>boende</small></span>
                    </div>
                    <div class="bus-board" id="busBoard">
                        <div class="bus-error">⏳ Laddar avgångar...</div>
                    </div>
                    <div class="bus-updated" id="busUpdateTime">Uppdateras...</div>
                </div>
            </div>

            <!-- AREA B: DN NEWS -->
            <div class="area">
                <div class="area-title">📰 SENASTE NYTT · DN.SE</div>
                <div class="area-content" id="newsBoard">
                    <div class="announcement-empty">⏳ Laddar nyheter...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- FULLSCREEN BUTTON -->
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  CONFIGURATION
            // ============================================================

            // SL Transport API – site 4000 = Ektorps centrum
            const BUS_API_URL = 'https://transport.integration.sl.se/v1/sites/4000/departures';

            // DN.se RSS feed (via rss2json.com to avoid CORS)
            const NEWS_API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://www.dn.se/rss/';

            // ============================================================
            //  1. GENERATE 132 RESIDENTS
            // ============================================================

            const grid = document.getElementById('directoryGrid');
            const total = 132;
            const firstNames = ['Emma', 'Liam', 'Olivia', 'Noah', 'Ava', 'James', 'Sophia', 'Lucas', 'Mia', 'Ethan',
                'Charlotte', 'Mason', 'Amelia', 'Logan', 'Harper', 'Oliver', 'Evelyn', 'Elijah', 'Abigail', 'Alexander',
                'Ella', 'Aiden', 'Scarlett', 'Carter', 'Grace', 'Matthew', 'Chloe', 'Daniel', 'Lily', 'Henry',
                'Zoey', 'Jackson', 'Nora', 'Sebastian', 'Hazel', 'Samuel', 'Ellie', 'David', 'Luna', 'Wyatt',
                'Aria', 'Owen', 'Mila', 'Gabriel', 'Aurora', 'Julian', 'Eleanor', 'Levi', 'Penelope', 'Isaac',
                'Hannah', 'Caleb', 'Layla', 'Hunter', 'Violet', 'Christian', 'Stella', 'Jonathan', 'Aubrey', 'Connor'
            ];
            const lastNames = ['Chen', 'Rodriguez', 'Williams', 'Jones', 'Brown', 'Davis', 'Miller', 'Wilson', 'Moore',
                'Taylor',
                'Anderson', 'Thomas', 'Jackson', 'White', 'Harris', 'Martin', 'Thompson', 'Garcia', 'Martinez',
                'Robinson',
                'Clark', 'Rodriguez', 'Lewis', 'Lee', 'Walker', 'Hall', 'Allen', 'Young', 'King', 'Wright',
                'Scott', 'Green', 'Adams', 'Baker', 'Gonzalez', 'Nelson', 'Carter', 'Mitchell', 'Perez', 'Roberts'
            ];
            const rooms = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M'];

            function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
            const usedNames = new Set();

            function generatePerson(index) {
                let firstName, lastName, fullName, attempts = 0;
                do {
                    firstName = getRandomItem(firstNames);
                    lastName = getRandomItem(lastNames);
                    fullName = `${firstName} ${lastName}`;
                    attempts++;
                } while (usedNames.has(fullName) && attempts < 50);
                usedNames.add(fullName);
                const roomNum = String(Math.floor(Math.random() * 900) + 100);
                const room = getRandomItem(rooms) + roomNum;
                return { name: fullName, room: room };
            }

            let html = '';
            for (let i = 0; i < total; i++) {
                const p = generatePerson(i);
                html += `<div class="grid-item"><span class="person-name">${p.name}</span><span class="person-room">${p.room}</span></div>`;
            }
            grid.innerHTML = html;
            document.getElementById('residentCount').textContent = total;

            // ============================================================
            //  2. CLOCK
            // ============================================================

            const clockEl = document.getElementById('clockDisplay');

            function updateClock() {
                const now = new Date();
                clockEl.textContent = now.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit',
                    second: '2-digit' });
            }
            updateClock();
            setInterval(updateClock, 1000);

            // ============================================================
            //  3. BUS DEPARTURES – SL Transport API (site 4000)
            // ============================================================

            const busBoard = document.getElementById('busBoard');
            const busUpdateTime = document.getElementById('busUpdateTime');

            async function fetchBusDepartures() {
                try {
                    const response = await fetch(BUS_API_URL);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const data = await response.json();

                    const allDepartures = data.departures || [];

                    // Filter to ONLY departures with destination "Slussen"
                    const slussenDepartures = allDepartures.filter(d =>
                        d.destination && d.destination.toLowerCase() === 'slussen'
                    );

                    if (slussenDepartures.length === 0) {
                        busBoard.innerHTML = `
                            <div class="bus-error">
                                🕒 Inga avgångar till Slussen just nu<br>
                                <small>Nästa uppdatering om 30 sekunder</small>
                            </div>
                        `;
                        busUpdateTime.textContent = `🔄 Uppdaterad: ${new Date().toLocaleTimeString('sv-SE')}`;
                        return;
                    }

                    const top6 = slussenDepartures.slice(0, 6);

                    let rows = '';
                    top6.forEach(d => {
                        const displayTime = d.display || '--:--';
                        const line = d.line?.designation || '?';
                        const destination = d.destination || 'Slussen';

                        let delayText = '';
                        let delayClass = 'on-time';
                        if (d.scheduled && d.expected) {
                            const scheduled = new Date(d.scheduled);
                            const expected = new Date(d.expected);
                            const delayMs = expected.getTime() - scheduled.getTime();
                            const delayMin = Math.round(delayMs / 60000);
                            if (delayMin > 0) {
                                delayText = `+${delayMin} min`;
                                delayClass = '';
                            } else if (delayMin < 0) {
                                delayText = `${delayMin} min`;
                                delayClass = '';
                            }
                        }

                        if (!delayText) {
                            delayText = 'i tid';
                        }

                        rows += `
                            <div class="bus-row">
                                <span class="bus-time">${displayTime}</span>
                                <span class="bus-line">${line}</span>
                                <span class="bus-dest">${destination}</span>
                                <span class="bus-delay ${delayClass}">${delayText}</span>
                            </div>
                        `;
                    });

                    busBoard.innerHTML = rows;

                    const now = new Date();
                    busUpdateTime.textContent =
                        `🔄 Uppdaterad: ${now.toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit', second:'2-digit' })}`;

                } catch (error) {
                    console.warn('Bus API error:', error);
                    busBoard.innerHTML = `
                        <div class="bus-error">
                            ⚠️ Kunde inte hämta avgångar<br>
                            <small>Försöker igen om 30 sekunder</small>
                        </div>
                    `;
                    busUpdateTime.textContent = `❌ Senaste försök: ${new Date().toLocaleTimeString('sv-SE')}`;
                }
            }

            fetchBusDepartures();
            setInterval(fetchBusDepartures, 30000);

            // ============================================================
            //  4. WEATHER – Open-Meteo API
            // ============================================================

            const weatherIcon = document.getElementById('weatherIcon');
            const weatherTemp = document.getElementById('weatherTemp');
            const weatherDesc = document.getElementById('weatherDesc');
            const weatherForecast = document.getElementById('weatherForecast');

            const weatherCodeMap = {
                0: { emoji: '☀️', desc: 'Klart' },
                1: { emoji: '🌤️', desc: 'Nästan klart' },
                2: { emoji: '⛅', desc: 'Halvklart' },
                3: { emoji: '☁️', desc: 'Molnigt' },
                45: { emoji: '🌫️', desc: 'Dimma' },
                48: { emoji: '🌫️', desc: 'Dimma' },
                51: { emoji: '🌦️', desc: 'Lätt duggregn' },
                53: { emoji: '🌧️', desc: 'Duggregn' },
                55: { emoji: '🌧️', desc: 'Kraftigt duggregn' },
                56: { emoji: '🌧️', desc: 'Lätt underkylt duggregn' },
                57: { emoji: '🌧️', desc: 'Underkylt duggregn' },
                61: { emoji: '🌦️', desc: 'Lätt regn' },
                63: { emoji: '🌧️', desc: 'Regn' },
                65: { emoji: '🌧️', desc: 'Kraftigt regn' },
                66: { emoji: '🌧️', desc: 'Lätt underkylt regn' },
                67: { emoji: '🌧️', desc: 'Underkylt regn' },
                71: { emoji: '🌨️', desc: 'Lätt snöfall' },
                73: { emoji: '🌨️', desc: 'Snöfall' },
                75: { emoji: '❄️', desc: 'Kraftigt snöfall' },
                77: { emoji: '🌨️', desc: 'Snökorn' },
                80: { emoji: '🌦️', desc: 'Lätta regnskurar' },
                81: { emoji: '🌧️', desc: 'Regnskurar' },
                82: { emoji: '⛈️', desc: 'Kraftiga regnskurar' },
                85: { emoji: '🌨️', desc: 'Lätta snöbyar' },
                86: { emoji: '❄️', desc: 'Snöbyar' },
                95: { emoji: '⛈️', desc: 'Åska' },
                96: { emoji: '⛈️', desc: 'Åska med hagel' },
                99: { emoji: '⛈️', desc: 'Kraftig åska med hagel' }
            };

            function getWeatherInfo(code) {
                return weatherCodeMap[code] || { emoji: '🌤️', desc: 'Okänt' };
            }

            async function fetchWeather() {
                const url =
                    'https://api.open-meteo.com/v1/forecast?latitude=59.31&longitude=18.16&current=temperature_2m,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm&forecast_days=3';

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();

                    const current = data.current;
                    const temp = Math.round(current.temperature_2m);
                    const weatherCode = current.weather_code;
                    const info = getWeatherInfo(weatherCode);

                    weatherIcon.textContent = info.emoji;
                    weatherTemp.innerHTML = `${temp}°<sup>C</sup>`;
                    weatherDesc.textContent = info.desc;

                    const daily = data.daily;
                    const days = ['I morgon', 'Övermorgon', '+2 dagar'];
                    let forecastHtml = '';
                    for (let i = 0; i < 3 && i < daily.time.length; i++) {
                        const code = daily.weather_code[i];
                        const fInfo = getWeatherInfo(code);
                        const high = Math.round(daily.temperature_2m_max[i]);
                        const low = Math.round(daily.temperature_2m_min[i]);
                        forecastHtml += `
                            <div class="forecast-day-header">
                                <span class="day-label">${days[i]}</span>
                                <span class="day-icon">${fInfo.emoji}</span>
                                <span class="day-temp">${high}° <span>${low}°</span></span>
                            </div>
                        `;
                    }
                    weatherForecast.innerHTML = forecastHtml;

                } catch (error) {
                    console.warn('Weather API error:', error);
                    weatherDesc.textContent = '⚠️ Väder ej tillgängligt';
                }
            }

            fetchWeather();
            setInterval(fetchWeather, 900000);

            // ============================================================
            //  5. NEWS – DN.se RSS feed (via rss2json)
            // ============================================================

            const newsBoard = document.getElementById('newsBoard');

            async function fetchNews() {
                try {
                    const response = await fetch(NEWS_API_URL);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();

                    if (data.status === 'ok' && data.items && data.items.length > 0) {
                        // Take the latest 4 headlines
                        const items = data.items.slice(0, 4);
                        let html = '';
                        items.forEach(item => {
                            const pubDate = new Date(item.pubDate);
                            const timeStr = pubDate.toLocaleTimeString('sv-SE', {
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                            // Sanitize title (remove HTML entities just in case)
                            const title = item.title
                                .replace(/&amp;/g, '&')
                                .replace(/&quot;/g, '"')
                                .replace(/&lt;/g, '<')
                                .replace(/&gt;/g, '>');
                            html += `
                                <div class="announcement-item">
                                    <span class="date">${timeStr}</span>
                                    <span class="title">${title}</span>
                                </div>
                            `;
                        });
                        newsBoard.innerHTML = html;
                    } else {
                        throw new Error('No items in feed');
                    }
                } catch (error) {
                    console.warn('News fetch failed:', error);
                    // Fallback – friendly message
                    newsBoard.innerHTML = `
                        <div class="announcement-item">
                            <span class="date">--:--</span>
                            <span class="title">📰 Kunde inte ladda DN-nyheter just nu</span>
                        </div>
                        <div class="announcement-item">
                            <span class="date">--:--</span>
                            <span class="title">🔄 Försöker igen om 60 sekunder</span>
                        </div>
                        <div class="announcement-item">
                            <span class="date">--:--</span>
                            <span class="title">Välkommen till BRF Ektorsvägen!</span>
                        </div>
                    `;
                }
            }

            // Initial fetch + every 60 seconds
            fetchNews();
            setInterval(fetchNews, 60000);

            // ============================================================
            //  6. FULLSCREEN & CURSOR
            // ============================================================

            const board = document.getElementById('board');
            const fsBtn = document.getElementById('fullscreenBtn');

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen?.() || document.documentElement
                        .webkitRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
                }
            }
            fsBtn.addEventListener('click', toggleFullscreen);
            board.addEventListener('dblclick', toggleFullscreen);
            document.addEventListener('fullscreenchange', updateButton);
            document.addEventListener('webkitfullscreenchange', updateButton);

            function updateButton() {
                fsBtn.textContent = document.fullscreenElement ? '⛶ Exit Fullscreen' : '⛶ Fullscreen';
            }

            let idleTimer;
            const body = document.body;

            function resetIdleTimer() {
                body.classList.remove('idle');
                clearTimeout(idleTimer);
                idleTimer = setTimeout(() => body.classList.add('idle'), 3000);
            }
            document.addEventListener('mousemove', resetIdleTimer);
            document.addEventListener('mousedown', resetIdleTimer);
            document.addEventListener('keydown', resetIdleTimer);
            resetIdleTimer();

            console.log('✅ BRF Ektorsvägen TV board ready (DN news + site 4000 → Slussen)');
        })();
    </script>
</body>
