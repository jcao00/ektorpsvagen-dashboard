<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ektorpsvägen Directory</title>

<meta http-equiv="refresh" content="1800">

<style>

:root{
    --bg:#121212;
    --panel:#1C1F1A;
    --header:#566F19;
    --accent:#8AA64A;
    --text:#F2F2F2;
    --sub:#C8C8C8;
    --border:#444444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI, Arial, sans-serif;
    height:100vh;
    overflow:hidden;
}

.container{
    display:grid;
    grid-template-columns: 78% 22%;
    grid-template-rows: 90px auto;
    height:100vh;
}

.header{
    grid-column:1 / span 2;
    background:var(--header);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-area img{
    height:55px;
}

.title{
    font-size:32px;
    font-weight:700;
}

.datetime{
    font-size:22px;
}

.main{
    padding:12px;
}

.directory{
    background:var(--panel);
    border:1px solid var(--border);
    height:100%;
    padding:10px;
}

.directory-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:6px;
}

.person{
    border-bottom:1px solid var(--border);
    padding:4px;
    font-size:14px;
}

.room{
    color:var(--accent);
    font-weight:bold;
}

.sidebar{
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.card{
    background:var(--panel);
    border:1px solid var(--border);
    padding:15px;
}

.weather{
    height:180px;
}

.weather-temp{
    font-size:48px;
    font-weight:bold;
}

.weather-city{
    color:var(--sub);
}

.area{
    flex:1;
}

.area h2{
    margin-bottom:10px;
    color:var(--accent);
}

.notice{
    margin-bottom:10px;
}

.traffic {
    background:#1C1F1A;
    border:1px solid #444444;
    color:#F2F2F2;
}

.departure-row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #333;
}

.route{
    color:#8AA64A;
    font-weight:600;
}

.ontime{
    color:#8AA64A;
}

.delayed{
    color:#ff6b6b;
    font-weight:bold;
}

.minutes{
    color:#C8C8C8;
}

</style>
</head>
<body>

</div>

</div>

</div>

</div>

</div>

<script>

/*****************************************************************
 EKTORP → SLUSSEN LIVE DEPARTURES
******************************************************************/

// Replace with actual Ektorps Centrum site id once verified
//const SITE_ID = 9001;

// SL Transport endpoint
//const API_URL =
//`https://transport.integration.sl.se/v1/sites/${SITE_ID}/departures`;

async function findEktorpSiteId() {

    const response =
        await fetch(
          "https://transport.integration.sl.se/v1/sites"
        );

    const sites =
        await response.json();

    const ektorp =
        sites.find(site =>
            site.name &&
            site.name.toLowerCase()
                .includes("ektorps centrum")
        );

    return ektorp?.id;

}

async function loadDepartures() {


}

async function loadDepartures() {

    const container = document.getElementById("departures");

    try {

        //const response = await fetch(API_URL);
        //const data = await response.json();

        let siteId =
            localStorage.getItem(
                "ektorpsSiteId"
            );

        if(!siteId){

            siteId =
                await findEktorpSiteId();

            if(!siteId){
                throw new Error(
                    "Ektorps centrum not found"
                );
            }

            localStorage.setItem(
                "ektorpsSiteId",
                siteId
            );
        }

 
 

        const response =
            await fetch(
            `https://transport.integration.sl.se/v1/sites/${siteId}/departures`
            );

        const data =
            await response.json();

        console.log(data);


        let departures = data.departures || [];

        // Only buses toward Slussen
        departures = departures.filter(dep => {

            const destination =
                (dep.destination || "").toLowerCase();

            const direction =
                (dep.direction || "").toLowerCase();

            return (
                destination.includes("slussen") ||
                direction.includes("slussen")
            );

        });

        departures = departures
            .sort((a,b)=>
                new Date(a.expected) -
                new Date(b.expected)
            )
            .slice(0,5);

        container.innerHTML = "";

        departures.forEach(dep => {

            const expected =
                new Date(dep.expected);

            const scheduled =
                new Date(dep.scheduled);

            const delayMinutes =
                Math.round(
                    (expected - scheduled)
                    / 60000
                );

            const timeString =
                expected.toLocaleTimeString(
                    'sv-SE',
                    {
                        hour:'2-digit',
                        minute:'2-digit'
                    }
                );

            const row =
                document.createElement("div");

            row.className =
                "departure-row";

            let statusHTML;

            if(delayMinutes > 0){

                statusHTML =
                    `<span class="delayed">
                        +${delayMinutes} min
                     </span>`;

            } else {

                statusHTML =
                    `<span class="ontime">
                        On time
                     </span>`;
            }

            row.innerHTML = `
                <div>
                    <span class="route">
                        ${dep.line.designation}
                    </span>
                    ${timeString}
                </div>

                <div>
                    ${statusHTML}
                </div>
            `;

            container.appendChild(row);

        });

        if(departures.length === 0){

            container.innerHTML =
            "<div>No departures found</div>";

        }

    }
    catch(error){

        console.error(error);

        container.innerHTML =
            "Unable to load departures";

    }

}

loadDepartures();

// refresh every minute
setInterval(loadDepartures,60000);


// CLOCK

function updateClock(){

const now = new Date();

document.getElementById("datetime").innerHTML =
now.toLocaleDateString('sv-SE') +
" " +
now.toLocaleTimeString('sv-SE');

}

setInterval(updateClock,1000);
updateClock();


// WEATHER (NACKA)

async function loadWeather(){

try{

const url =
"https://api.open-meteo.com/v1/forecast?latitude=59.31&longitude=18.16&current=temperature_2m,wind_speed_10m";

const response = await fetch(url);

const data = await response.json();

document.getElementById("temp").innerHTML =
Math.round(data.current.temperature_2m) + "°C";

document.getElementById("weatherDesc").innerHTML =
"Wind " +
Math.round(data.current.wind_speed_10m) +
" km/h";

}
catch(err){

console.log(err);

}

}

loadWeather();


// RESIDENT DIRECTORY

const sampleResidents = [];

for(let i=1;i<=132;i++){

sampleResidents.push({
name:"Resident " + i,
room:"A" + (100+i)
});

}

function renderResidents(data){

const grid = document.getElementById("directoryGrid");

grid.innerHTML="";

data.forEach(person=>{

const div = document.createElement("div");

div.className="person";

div.innerHTML=
`${person.name}<br><span class="room">${person.room}</span>`;

grid.appendChild(div);

});

}

renderResidents(sampleResidents);
